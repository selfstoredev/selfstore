name: ci

# The full quality gate on every push and PR to main. Self-contained (sonarjs
# rules in eslint, knip, jscpd, coverage thresholds), so it runs anywhere.
# The library is framework-agnostic and its tests run in plain Node (native
# WebCrypto), so there is nothing to install beyond the dev toolchain.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts # block install-time lifecycle scripts (supply-chain)
      - name: Format check (prettier)
        run: npm run format:check
      - name: Lint (eslint + sonarjs, zero warnings)
        run: npm run lint
      - name: Type-check
        run: npm run typecheck
      - name: Dead code (knip)
        run: npm run knip
      - name: Duplication (jscpd)
        run: npm run dup
      - name: Audit runtime dependencies
        run: npm audit --omit=dev --audit-level=high

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Test with coverage thresholds
        run: npm run test:coverage # thresholds in vitest.config.ts are a ratchet
      - name: Build
        run: npm run build
      - name: Pack sanity
        run: npm pack --dry-run # the exact file list a release would ship

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # scan the whole history, not just the tip
      - name: Scan for secrets
        run: docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:latest detect --source /repo --redact --no-banner
